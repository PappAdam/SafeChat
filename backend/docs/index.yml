openapi: "3.0.3"
info:
  title: SafeChat API Docs
  version: "1.0"
components:
  securitySchemes:
    JWTAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserCredentials:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "testuser"
        password:
          type: string
          example: "SecurePass123"
    AuthSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: "Success"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR..."
    ServerErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Server error"
paths:
  /auth/login:
    post:
      summary: User Login
      description: Login with email and password to get a JWT token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: User's email address
                password:
                  type: string
                  format: password
                  description: User's password
      responses:
        "200":
          description: Successful login, JWT token returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authentication
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      summary: User Registration
      description: Register a new user with email and password.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: User's email address
                password:
                  type: string
                  format: password
                  description: User's password
                username:
                  type: string
                  description: User's desired username
      responses:
        "201":
          description: User successfully created, JWT token returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authentication
        "400":
          description: Invalid input or email already in use
